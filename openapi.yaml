openapi: 3.0.3
info:
  title: BuildingSwell Public API
  version: 2.0.0
  description: |
    BuildingSwell v2 Public API. All endpoints require the `X-API-Key` header.
    Keys are scoped to your organization — all data is automatically filtered.

    See the [Guides](/index) for querying, filtering, joins, and response formats.

servers:
  - url: https://app.buildingswell.com/api/v2
    description: BuildingSwell production

security:
  - ApiKeyAuth: []

tags:
  - name: Projects
    description: Top-level project groupings
  - name: Stages
    description: Stage Masters — reusable department-scoped shop stations
  - name: Deliverables
    description: Work-tree nodes (orders, routes, phases, stages, steps, etc.)
  - name: Work sessions
    description: Work sessions on deliverables
  - name: Comments
    description: Comments on deliverables
  - name: Documents
    description: Documents attached to deliverables
  - name: Notes
    description: Notes on deliverables
  - name: Notifications
    description: Notifications and read-state
  - name: QC
    description: QC inspection sets and templates
  - name: Dependencies
    description: Dependency links between deliverables
  - name: Workers
    description: Workforce roster
  - name: Timesheets
    description: Unified time-tracking records (read-only)
  - name: Organization
    description: Roles, members, and API keys
  - name: Concepts
    description: Concept-aware deliverable endpoints with validation

paths:
  /project:
    get:
      tags: [Projects]
      summary: List projects
      description: List and filter project records. Supports pagination, sorting, search, and filters.
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/filter'
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
    post:
      tags: [Projects]
      summary: Create project(s)
      description: Create one or many project records.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ProjectCreate'
                - type: array
                  items:
                    $ref: '#/components/schemas/ProjectCreate'
      responses:
        '200':
          description: Created project(s)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SingleResponse'
                  - $ref: '#/components/schemas/MultiResponse'

  /project/{id}:
    get:
      tags: [Projects]
      summary: Get project
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Project record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleResponse'
    patch:
      tags: [Projects]
      summary: Update project
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdate'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleResponse'
    put:
      tags: [Projects]
      summary: Upsert project
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreate'
      responses:
        '200':
          description: Upserted project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleResponse'
    delete:
      tags: [Projects]
      summary: Delete project
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Deleted

  /project/count:
    get:
      tags: [Projects]
      summary: Count projects
      parameters:
        - $ref: '#/components/parameters/filter'
      responses:
        '200':
          description: Count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountResponse'
    post:
      tags: [Projects]
      summary: Count projects (large filter)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryBody'
      responses:
        '200':
          description: Count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountResponse'

  /project/query:
    post:
      tags: [Projects]
      summary: Query projects
      description: List projects when the filter is too large for a GET query string.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryBody'
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'

  /project/bulk:
    patch:
      tags: [Projects]
      summary: Bulk update projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated records
    put:
      tags: [Projects]
      summary: Bulk upsert projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
      responses:
        '200':
          description: Upserted records

  /project/group-and-count:
    post:
      tags: [Projects]
      summary: Group and count projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupAndCountBody'
      responses:
        '200':
          description: Grouped counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupAndCountResponse'

  /stage:
    get:
      tags: [Stages]
      summary: List stage masters
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/filter'
      responses:
        '200':
          description: List of stage masters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
    post:
      tags: [Stages]
      summary: Create stage master(s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, shopId, maxOrderCapacity]
              properties:
                name:
                  type: string
                shopId:
                  type: string
                  format: uuid
                description:
                  type: string
                  nullable: true
                maxOrderCapacity:
                  type: integer
                  minimum: 0
                costCode:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Created stage master(s)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleResponse'

  /stage/{id}:
    get:
      tags: [Stages]
      summary: Get stage master
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Stage master
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleResponse'
    patch:
      tags: [Stages]
      summary: Update stage master
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated stage master
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleResponse'
    put:
      tags: [Stages]
      summary: Upsert stage master
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Upserted stage master
    delete:
      tags: [Stages]
      summary: Delete stage master
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Deleted

  /stage/query:
    post:
      tags: [Stages]
      summary: Query stage masters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryBody'
      responses:
        '200':
          description: List of stage masters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'

  /stage/group-and-count:
    post:
      tags: [Stages]
      summary: Group and count stage masters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupAndCountBody'
      responses:
        '200':
          description: Grouped counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupAndCountResponse'

  /deliverable:
    get:
      tags: [Deliverables]
      summary: List deliverables
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/orderBy'
        - $ref: '#/components/parameters/select'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/filter'
      responses:
        '200':
          description: List of deliverables
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
    post:
      tags: [Deliverables]
      summary: Create deliverable(s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/DeliverableCreate'
                - type: array
                  items:
                    $ref: '#/components/schemas/DeliverableCreate'
      responses:
        '200':
          description: Created deliverable(s)

  /deliverable/{id}:
    get:
      tags: [Deliverables]
      summary: Get deliverable
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Deliverable record
    patch:
      tags: [Deliverables]
      summary: Update deliverable
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated deliverable
    put:
      tags: [Deliverables]
      summary: Upsert deliverable
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Upserted deliverable
    delete:
      tags: [Deliverables]
      summary: Delete deliverable
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Deleted

  /deliverable/bulk:
    put:
      tags: [Deliverables]
      summary: Bulk upsert deliverables
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
      responses:
        '200':
          description: Upserted records

  /deliverable/query:
    post:
      tags: [Deliverables]
      summary: Query deliverables
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryBody'
      responses:
        '200':
          description: List of deliverables

  /deliverable/group-and-count:
    post:
      tags: [Deliverables]
      summary: Group and count deliverables
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupAndCountBody'
      responses:
        '200':
          description: Grouped counts

  /deliverable/{id}/hierarchy:
    get:
      tags: [Deliverables]
      summary: Get deliverable hierarchy
      description: Returns all deliverables in the subtree rooted at the given id.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Hierarchy
          content:
            application/json:
              schema:
                type: object
                properties:
                  values:
                    type: array
                    items:
                      type: object
                  totalCount:
                    type: integer

  /deliverable/groups:
    post:
      tags: [Deliverables]
      summary: Group deliverables
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groupBy]
              properties:
                groupBy:
                  type: string
                  enum: [project, stage, people, root, tags]
      responses:
        '200':
          description: Grouped deliverables

  /deliverable/reorder:
    post:
      tags: [Deliverables]
      summary: Reorder deliverables
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rootParentId, orderedDeliverableIds]
              properties:
                rootParentId:
                  type: string
                  format: uuid
                orderedDeliverableIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '204':
          description: Reordered

  /deliverable/crew-time:
    get:
      tags: [Deliverables]
      summary: Get crew time
      parameters:
        - name: deliverableId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Crew time by deliverable id

  /deliverable/root/{rootId}/schedule/{id}:
    post:
      tags: [Deliverables]
      summary: Schedule a deliverable
      parameters:
        - name: rootId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Scheduled deliverable

  /deliverable/schedule/batch:
    post:
      tags: [Deliverables]
      summary: Batch schedule deliverables
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required: [rootParentId, targetId, startDate, endDate]
                properties:
                  rootParentId:
                    type: string
                    format: uuid
                  targetId:
                    type: string
                    format: uuid
                  startDate:
                    type: string
                    format: date-time
                  endDate:
                    type: string
                    format: date-time
      responses:
        '200':
          description: Batch scheduled

  /deliverable/root/{rootId}/progress/{id}:
    post:
      tags: [Deliverables]
      summary: Update deliverable progress
      parameters:
        - name: rootId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [waiting, todo, wip, rework, on-hold, done]
                completed:
                  type: number
                wip:
                  type: number
                percentage:
                  type: number
      responses:
        '200':
          description: Updated deliverable

  /deliverable/export:
    get:
      tags: [Deliverables]
      summary: Export deliverables to Excel
      description: Returns a .xlsx file (max 10,000 rows). Accepts the same filters as GET /deliverable.
      parameters:
        - $ref: '#/components/parameters/filter'
        - name: timezone
          in: query
          schema:
            type: string
            example: America/New_York
      responses:
        '200':
          description: Excel file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /deliverable/import:
    post:
      tags: [Deliverables]
      summary: Import deliverables from Excel
      description: Rate-limited to 100 requests/min. Only .xlsx, max 10 MB.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                timezone:
                  type: string
                  example: America/New_York
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: object
                  data:
                    type: object

  /comment:
    get:
      tags: [Comments]
      summary: List comments
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/filter'
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
    post:
      tags: [Comments]
      summary: Create comment(s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Created comment(s)

  /comment/{id}:
    get:
      tags: [Comments]
      summary: Get comment
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Comment record
    patch:
      tags: [Comments]
      summary: Update comment
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated comment
    put:
      tags: [Comments]
      summary: Upsert comment
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Upserted comment
    delete:
      tags: [Comments]
      summary: Delete comment
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Deleted

  /comment/query:
    post:
      tags: [Comments]
      summary: Query comments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryBody'
      responses:
        '200':
          description: List of comments

  /comment/group-and-count:
    post:
      tags: [Comments]
      summary: Group and count comments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupAndCountBody'
      responses:
        '200':
          description: Grouped counts

  /document:
    get:
      tags: [Documents]
      summary: List documents
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/filter'
      responses:
        '200':
          description: List of documents
    post:
      tags: [Documents]
      summary: Create document(s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Created document(s)

  /document/{id}:
    get:
      tags: [Documents]
      summary: Get document
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Document record
    patch:
      tags: [Documents]
      summary: Update document
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated document
    put:
      tags: [Documents]
      summary: Upsert document
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Upserted document
    delete:
      tags: [Documents]
      summary: Delete document
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Deleted

  /document/query:
    post:
      tags: [Documents]
      summary: Query documents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryBody'
      responses:
        '200':
          description: List of documents

  /note:
    get:
      tags: [Notes]
      summary: List notes
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/filter'
      responses:
        '200':
          description: List of notes
    post:
      tags: [Notes]
      summary: Create note(s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Created note(s)

  /note/{id}:
    get:
      tags: [Notes]
      summary: Get note
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Note record
    patch:
      tags: [Notes]
      summary: Update note
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated note
    put:
      tags: [Notes]
      summary: Upsert note
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Upserted note
    delete:
      tags: [Notes]
      summary: Delete note
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: Deleted

  /note/by-deliverable:
    put:
      tags: [Notes]
      summary: Create or update note by deliverable
      description: Creates if missing, updates if it exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deliverableId, content]
              properties:
                deliverableId:
                  type: string
                  format: uuid
                content:
                  type: string
      responses:
        '200':
          description: Note created or updated

  /notification:
    get:
      tags: [Notifications]
      summary: List notifications
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/filter'
      responses:
        '200':
          description: List of notifications

  /notification/{id}:
    get:
      tags: [Notifications]
      summary: Get notification
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Notification record

  /notification/read-channel-comments:
    post:
      tags: [Notifications]
      summary: Mark channel comments as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channelId]
              properties:
                channelId:
                  type: string
                  format: uuid
      responses:
        '204':
          description: Marked as read

  /notification/read-deliverable-documents:
    post:
      tags: [Notifications]
      summary: Mark deliverable documents as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deliverableId]
              properties:
                deliverableId:
                  type: string
                  format: uuid
      responses:
        '204':
          description: Marked as read

  /qc-inspection-set:
    get:
      tags: [QC]
      summary: List QC inspection sets
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/filter'
      responses:
        '200':
          description: List of QC inspection sets
    post:
      tags: [QC]
      summary: Create QC inspection set(s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Created QC inspection set(s)

  /qc-inspection-set/{id}:
    get:
      tags: [QC]
      summary: Get QC inspection set
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: QC inspection set record
    patch:
      tags: [QC]
