      description: Returns proposed changes without writing. Use before destructive progress actions.
      parameters:
        - name: rootId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                quantity:
                  type: number
      responses:
        '200':
          description: Preflight result

  /concepts/root/{rootId}/progress/{id}/apply:
    post:
      tags: [Concepts]
      summary: Apply progress action
      description: Applies progress action with cascades. Stops work sessions and removes worker plans for done nodes.
      parameters:
        - name: rootId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                quantity:
                  type: number
      responses:
        '200':
          description: Progress applied

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 50
    orderBy:
      name: orderBy
      in: query
      schema:
        type: string
        example: name:asc
    select:
      name: select
      in: query
      schema:
        type: string
        example: id,name,identifier
    search:
      name: search
      in: query
      schema:
        type: string
    filter:
      name: filter
      in: query
      schema:
        type: string

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            missingPermissions:
              type: array
              items:
                type: string

    SingleResponse:
      type: object
      properties:
        value:
          type: object

    MultiResponse:
      type: object
      properties:
        values:
          type: array
          items:
            type: object

    ListResponse:
      type: object
      properties:
        values:
          type: array
          items:
            type: object
        hasMore:
          type: boolean

    CountResponse:
      type: object
      properties:
        count:
          type: integer

    GroupAndCountBody:
      type: object
      required: [groupByField]
      properties:
        groupByField:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        unnestGroupByField:
          type: boolean

    GroupAndCountResponse:
      type: object
      properties:
        values:
          type: array
          items:
            type: object
            properties:
              groupId: {}
              count:
                type: integer
        hasMore:
          type: boolean

    QueryBody:
      type: object
      properties:
        filter:
          type: string
        page:
          type: integer
        pageSize:
          type: integer
        orderBy:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        select:
          type: array
          items:
            type: string

    ProjectCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        scheduledStartDate:
          type: string
          format: date
          nullable: true
        scheduledEndDate:
          type: string
          format: date
          nullable: true
        actualEndDate:
          type: string
          format: date
          nullable: true
        costCode:
          type: string
          nullable: true
        isArchived:
          type: boolean
          default: false

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
        scheduledStartDate:
          type: string
          format: date
          nullable: true
        scheduledEndDate:
          type: string
          format: date
          nullable: true
        actualEndDate:
          type: string
          format: date
          nullable: true
        costCode:
          type: string
          nullable: true
        isArchived:
          type: boolean

    DeliverableCreate:
      type: object
      required: [type, name]
      properties:
        type:
          type: string
          enum: [order, route, overhead, template-phase, phase, component, stage, step, qcstep]
        name:
          type: string
        quantity:
          type: integer
          default: 1
        parentId:
          type: string
          format: uuid
          nullable: true
        data:
          type: object

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
